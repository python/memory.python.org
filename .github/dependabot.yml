version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "quarterly"
    cooldown:
      default-days: 7
    groups:
      # Batch low-risk minor/patch bumps into a single PR to cut review noise;
      # major bumps open as individual PRs.
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "quarterly"
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
